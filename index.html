<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Silsilah Keluarga</title>
<meta name="description" content="Buku catatan keturunan keluarga besar — pohon, jaringan, dan hubungan kekerabatan otomatis.">
<meta name="theme-color" content="#253a52">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Silsilah">
<style>
  html, body { margin:0; padding:0; background:#f2ead9; font-family:'Source Sans 3', Georgia, sans-serif; }
</style>
</head>
<body>
<div id="silsilah-root"></div>
<style>
  #silsilah-root {
    --paper: #f2ead9;
    --paper-deep: #e7dcc2;
    --ink: #2c2117;
    --ink-soft: #5c4f3d;
    --indigo: #253a52;
    --brass: #a9762f;
    --brass-light: #c9974f;
    --thread: #1f6b47;
    --line: #cbb98c;
    --danger: #8c3a2b;
    font-family: 'Source Sans 3', Georgia, sans-serif;
    background: var(--paper);
    color: var(--ink);
    border-radius: 14px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.05);
  }
  #silsilah-root * { box-sizing: border-box; }
  .sk-wrap { display: flex; min-height: 640px; }
  .sk-side {
    width: 300px; flex-shrink: 0;
    background: var(--paper-deep);
    border-right: 1px solid var(--line);
    padding: 22px 18px;
    overflow-y: auto;
    max-height: 720px;
  }
  .sk-main { flex: 1; padding: 22px 26px; overflow-y: auto; max-height: 720px; }
  .sk-brand {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--indigo); margin: 0 0 2px 0;
  }
  .sk-brand-sub { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brass); margin-bottom: 18px; }
  .sk-tabs { display: flex; flex-wrap: wrap; gap: 2px 4px; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
  .sk-tab {
    background: none; border: none; cursor: pointer; padding: 7px 8px;
    font-size: 12px; color: var(--ink-soft); border-bottom: 2px solid transparent;
    font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .sk-tab.active { color: var(--indigo); border-bottom-color: var(--brass); font-weight: 600; }
  .sk-field { margin-bottom: 12px; }
  .sk-field label { display: block; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px; }
  .sk-field input, .sk-field select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: #fffdf8; font-size: 14px; color: var(--ink); font-family: inherit;
  }
  .sk-field input:focus, .sk-field select:focus { outline: 2px solid var(--brass-light); outline-offset: 1px; }
  .sk-btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer;
    background: var(--indigo); color: #fff; font-size: 14px; font-weight: 600; font-family: inherit;
    letter-spacing: 0.02em; margin-top: 4px;
  }
  .sk-btn:hover { background: #1c2d40; }
  .sk-btn.secondary { background: transparent; color: var(--indigo); border: 1px solid var(--indigo); }
  .sk-btn.secondary:hover { background: rgba(37,58,82,0.06); }
  .sk-radio-row { display: flex; gap: 8px; }
  .sk-radio-row label {
    flex: 1; text-align: center; padding: 7px 4px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13px; cursor: pointer; text-transform: none; color: var(--ink-soft);
  }
  .sk-radio-row input { display: none; }
  .sk-radio-row input:checked + span { color: var(--indigo); font-weight: 700; }
  .sk-radio-row label:has(input:checked) { border-color: var(--brass); background: rgba(169,118,47,0.08); }

  .sk-banner {
    background: #eaf3ec; border: 1px solid var(--thread); border-left: 4px solid var(--thread);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 13.5px; color: #1a4530;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .sk-banner .icon { font-size: 16px; }
  .sk-empty {
    text-align: center; padding: 60px 20px; color: var(--ink-soft);
  }
  .sk-empty .glyph { font-size: 34px; margin-bottom: 10px; }

  .sk-search-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .sk-search-row select { flex: 1; min-width: 180px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fffdf8; font-family: inherit; }

  .sk-list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 14px; cursor: pointer;
  }
  .sk-list-item:hover { background: rgba(169,118,47,0.06); }
  .sk-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.03em; }
  .sk-tag.L { background: #dfe9f2; color: var(--indigo); }
  .sk-tag.P { background: #f4e3d6; color: var(--danger); }

  .sk-section-title {
    font-family: 'Playfair Display', Georgia, serif; font-size: 17px; color: var(--indigo);
    margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px;
  }
  .sk-focus-select { margin-bottom: 18px; }

  svg.sk-tree text { font-family: 'Source Sans 3', sans-serif; }
  .sk-node-card { cursor: pointer; }
  .sk-node-card:hover rect.sk-card-bg { stroke: var(--brass); stroke-width: 2; }

  .sk-relation-result {
    margin-top: 18px; padding: 16px; background: #fffdf8; border: 1px solid var(--line); border-radius: 10px;
  }
  .sk-relation-title { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: var(--indigo); margin-bottom: 8px; }
  .sk-chain { font-size: 13px; color: var(--ink-soft); line-height: 1.8; }
  .sk-chain .node { color: var(--ink); font-weight: 600; }

  .sk-net-legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-bottom: 14px; font-size: 12.5px; color: var(--ink-soft); }
  .sk-net-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; }
  .sk-net-hint { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px; }
  .sk-net-node { cursor: pointer; }
  .sk-net-node:hover circle.sk-net-dot { stroke-width: 3; }
  .sk-chain .arrow { color: var(--brass); margin: 0 4px; }
</style>

<script>
(function(){
  const root = document.getElementById('silsilah-root');
  let people = {};
  let ready = false;

  const STORE_KEY = 'silsilah-data';

  function uid(){ return 'p' + Math.random().toString(36).slice(2,10); }

  function normalizeName(n){ return (n||'').trim().toLowerCase().replace(/\s+/g,' '); }
  function displayName(p){
    if(!p) return '(tidak diketahui)';
    if(p.name && p.alias) return `${p.name} (${p.alias})`;
    return p.name || p.alias || '(Tanpa nama)';
  }

  function compressPhotoFile(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          const maxDim = 200;
          let w = img.width, h = img.height;
          if(w > h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
          else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function avatarEl(p, size){
    size = size || 34;
    const initial = (displayName(p) || '?').trim().charAt(0).toUpperCase();
    const bg = p.gender === 'L' ? '#dfe9f2' : '#f4e3d6';
    const fg = p.gender === 'L' ? '#253a52' : '#8c3a2b';
    if(p.photo){
      return el('img', {src: p.photo, style:`width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--line);`});
    }
    const d = el('div', {style:`width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px;font-weight:700;background:${bg};color:${fg};`}, [initial]);
    return d;
  }
  function unlinkChildFromParent(childId, parentId){
    if(!parentId) return;
    const p = people[parentId];
    if(p) p.childrenIds = p.childrenIds.filter(cid => cid !== childId);
  }

  async function loadData(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){ people = JSON.parse(raw); }
    }catch(e){ people = {}; }
    ready = true;
  }
  async function saveData(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(people)); }
    catch(e){ console.error('gagal menyimpan (mungkin penyimpanan penuh)', e); alert('Gagal menyimpan. Kemungkinan penyimpanan browser penuh — coba hapus beberapa foto besar atau ekspor & bersihkan data lama.'); }
  }

  // ---------- Data model helpers ----------
  function newPerson(data){
    const id = uid();
    people[id] = {
      id, name: data.name || '', alias: data.alias || '', gender: data.gender, photo: data.photo || '',
      birthDay: data.birthDay || '', birthMonth: data.birthMonth || '', birthYear: data.birthYear || '',
      address: data.address || '', contact: data.contact || '', job: data.job || '',
      isDeceased: !!data.isDeceased,
      deathDay: data.deathDay || '', deathMonth: data.deathMonth || '', deathYear: data.deathYear || '',
      fatherId: data.fatherId || null, motherId: data.motherId || null,
      spouseIds: [], childrenIds: [], notes: data.notes || ''
    };
    return id;
  }

  function updatePersonBasics(id, data){
    const p = people[id];
    if(!p) return;
    p.name = data.name || '';
    p.alias = data.alias || '';
    p.gender = data.gender;
    p.photo = data.photo || '';
    p.birthDay = data.birthDay || '';
    p.birthMonth = data.birthMonth || '';
    p.birthYear = data.birthYear || '';
    p.address = data.address || '';
    p.contact = data.contact || '';
    p.job = data.job || '';
    p.isDeceased = !!data.isDeceased;
    p.deathDay = data.deathDay || '';
    p.deathMonth = data.deathMonth || '';
    p.deathYear = data.deathYear || '';
    p.notes = data.notes || '';
  }

  function linkChildToParent(childId, parentId){
    if(!parentId) return;
    const p = people[parentId];
    if(p && !p.childrenIds.includes(childId)) p.childrenIds.push(childId);
  }

  // Menyambungkan anak ke ayah/ibu DUA ARAH: childrenIds milik ortu, dan fatherId/motherId milik anak.
  function linkChildBothWays(childId, fatherId, motherId){
    const c = people[childId];
    if(!c) return;
    if(fatherId){ if(!c.fatherId) c.fatherId = fatherId; linkChildToParent(childId, fatherId); }
    if(motherId){ if(!c.motherId) c.motherId = motherId; linkChildToParent(childId, motherId); }
  }

  function deletePerson(id){
    const p = people[id];
    if(!p) return;
    unlinkChildFromParent(id, p.fatherId);
    unlinkChildFromParent(id, p.motherId);
    p.spouseIds.forEach(sid=>{ const s = people[sid]; if(s) s.spouseIds = s.spouseIds.filter(x=>x!==id); });
    Object.values(people).forEach(op=>{
      if(op.fatherId === id) op.fatherId = null;
      if(op.motherId === id) op.motherId = null;
      op.childrenIds = op.childrenIds.filter(x=>x!==id);
    });
    delete people[id];
  }

  function linkSpouses(idA, idB){
    if(!idA || !idB || idA === idB) return;
    const a = people[idA], b = people[idB];
    if(a && !a.spouseIds.includes(idB)) a.spouseIds.push(idB);
    if(b && !b.spouseIds.includes(idA)) b.spouseIds.push(idA);
  }

  function addPerson(data){
    const id = newPerson(data);
    linkChildToParent(id, data.fatherId);
    linkChildToParent(id, data.motherId);
    if(data.spouseId) linkSpouses(id, data.spouseId);
    return id;
  }

  async function seedDemoData(){
    const karta = addPerson({name:'Karta', gender:'L'});
    const inah = addPerson({name:'Inah', gender:'P'});
    const somad = addPerson({name:'Somad', gender:'L', fatherId:karta, motherId:inah});
    const marto = addPerson({name:'Marto', gender:'L', fatherId:karta, motherId:inah});
    const aminah = addPerson({name:'Aminah', gender:'P'});
    linkSpouses(somad, aminah);
    const wongso = addPerson({name:'Wongso', gender:'L'});
    const sarinah = addPerson({name:'Sarinah', gender:'P'});
    const rahman = addPerson({name:'Rahman', gender:'L', fatherId:somad, motherId:aminah});
    const siti = addPerson({name:'Siti', gender:'P', fatherId:wongso, motherId:sarinah});
    linkSpouses(rahman, siti);
    addPerson({name:'Wati', gender:'P', fatherId:marto});
    const ujang = addPerson({name:'Ujang', gender:'L', fatherId:rahman, motherId:siti});
    addPerson({name:'Euis', gender:'P', fatherId:rahman, motherId:siti});
    addPerson({name:'Dede', gender:'L', fatherId:ujang});
    people[karta].isDeceased = true; people[karta].deathYear = '1978';
    people[inah].isDeceased = true; people[inah].deathYear = '1981';
    people[somad].isDeceased = true; people[somad].deathYear = '2009';
    await saveData();
  }

  function nameMatches(p, nn){
    if(!nn) return false;
    if(normalizeName(p.name) === nn) return true;
    if(p.alias && normalizeName(p.alias) === nn) return true;
    if(p.name && p.alias && normalizeName(displayName(p)) === nn) return true;
    return false;
  }

  // Cari orang berdasarkan nama (persis/mirip). Kalau belum ada, buat baru otomatis.
  function resolveOrCreatePerson(rawInput, guessGender, currentLinkedId){
    if(!rawInput) return null;
    let name = rawInput.trim();
    let gender = guessGender;
    const genderTag = name.match(/\(([LP])\)\s*$/i);
    if(genderTag){ gender = genderTag[1].toUpperCase(); name = name.replace(/\(([LP])\)\s*$/i,'').trim(); }
    if(!name) return null;
    const nn = normalizeName(name);
    const matches = Object.values(people).filter(p => nameMatches(p, nn));
    if(matches.length){
      // Kalau nama yang diketik masih sama dengan sambungan yang sudah ada sebelumnya, tidak perlu tanya lagi.
      if(currentLinkedId && matches.some(m => m.id === currentLinkedId)){
        return { id: currentLinkedId, isNew: false };
      }
      const existing = matches[0];
      const bd = formatBirth(existing);
      const parentInfo = [];
      if(existing.fatherId) parentInfo.push('ayah: '+displayName(people[existing.fatherId]));
      if(existing.motherId) parentInfo.push('ibu: '+displayName(people[existing.motherId]));
      const detail = [bd?('lahir '+bd):null, parentInfo.length?parentInfo.join(', '):null].filter(Boolean).join(' · ');
      const extra = matches.length > 1 ? `\n\n(Ada ${matches.length} orang dengan nama sama di data — ini yang pertama ditemukan.)` : '';
      const msg = `Sudah ada "${displayName(existing)}"${detail?' ('+detail+')':''} di data.${extra}\n\nApakah ini ORANG YANG SAMA dengan yang Anda maksud?\n\nOK = Ya, sambungkan ke data yang sudah ada\nBatal = Bukan, ini orang lain — buat data baru terpisah`;
      const isSame = window.confirm(msg);
      if(isSame) return { id: existing.id, isNew: false };
    }
    const id = newPerson({name, gender: gender || 'L'});
    return { id, isNew: true };
  }

  const MONTH_NAMES = ['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  function formatBirth(p){
    const monthLabel = p.birthMonth ? MONTH_NAMES[parseInt(p.birthMonth,10)] : '';
    const parts = [p.birthDay, monthLabel, p.birthYear].filter(Boolean);
    return parts.join(' ');
  }
  function formatDeath(p){
    const monthLabel = p.deathMonth ? MONTH_NAMES[parseInt(p.deathMonth,10)] : '';
    const parts = [p.deathDay, monthLabel, p.deathYear].filter(Boolean);
    return parts.join(' ');
  }

  // detect people with same normalized name but different id (possible same person from another branch)
  function detectPossibleMatches(name, excludeId){
    const nn = normalizeName(name);
    return Object.values(people).filter(p => p.id !== excludeId && nameMatches(p, nn));
  }

  // BFS over undirected relation graph (parent-child + spouse) to find connection path
  function buildAdjacency(){
    const adj = {};
    Object.values(people).forEach(p => {
      adj[p.id] = adj[p.id] || [];
      if(p.fatherId){ adj[p.id].push({to:p.fatherId, type:'father'}); adj[p.fatherId] = adj[p.fatherId]||[]; adj[p.fatherId].push({to:p.id, type:'child'}); }
      if(p.motherId){ adj[p.id].push({to:p.motherId, type:'mother'}); adj[p.motherId] = adj[p.motherId]||[]; adj[p.motherId].push({to:p.id, type:'child'}); }
      p.spouseIds.forEach(sid => { adj[p.id].push({to:sid, type:'spouse'}); });
    });
    return adj;
  }

  function findPath(fromId, toId){
    if(fromId === toId) return null;
    const adj = buildAdjacency();
    const visited = new Set([fromId]);
    const queue = [[fromId]];
    while(queue.length){
      const path = queue.shift();
      const last = path[path.length-1];
      const edges = adj[last] || [];
      for(const e of edges){
        if(visited.has(e.to)) continue;
        const newPath = path.concat([e.to]);
        if(e.to === toId) return newPath;
        visited.add(e.to);
        queue.push(newPath);
      }
    }
    return null;
  }

  function ancestorsMap(id){
    // map ancestorId -> generation distance (0 = self)
    const map = {[id]: 0};
    let frontier = [id];
    let gen = 0;
    while(frontier.length){
      gen++;
      const next = [];
      frontier.forEach(pid=>{
        const p = people[pid];
        if(!p) return;
        [p.fatherId, p.motherId].forEach(par=>{
          if(par && !(par in map)){ map[par] = gen; next.push(par); }
        });
      });
      frontier = next;
    }
    return map;
  }

  function findCommonAncestorRelation(idA, idB){
    const ancA = ancestorsMap(idA);
    const ancB = ancestorsMap(idB);
    let best = null;
    Object.keys(ancA).forEach(pid=>{
      if(pid in ancB){
        const total = ancA[pid] + ancB[pid];
        if(!best || total < best.total) best = {id: pid, gapA: ancA[pid], gapB: ancB[pid], total};
      }
    });
    return best;
  }

  // ---------- Klan (pewarnaan per keluarga besar) ----------
  const CLAN_PALETTE = ['#253a52','#0f6e8c','#993c1d','#712b13','#5f3a99','#0f6e56','#993556','#854f0b','#3b6d11'];
  let clanRootCache = {};
  function getClanRoot(id, seen){
    seen = seen || new Set();
    if(seen.has(id)) return id;
    seen.add(id);
    if(clanRootCache[id]) return clanRootCache[id];
    const p = people[id];
    if(!p) return id;
    const rootId = p.fatherId ? getClanRoot(p.fatherId, seen) : id;
    clanRootCache[id] = rootId;
    return rootId;
  }
  let clanColorAssign = {};
  function getClanColor(id){
    clanRootCache = {};
    const root = getClanRoot(id);
    if(!(root in clanColorAssign)){
      clanColorAssign[root] = CLAN_PALETTE[Object.keys(clanColorAssign).length % CLAN_PALETTE.length];
    }
    return { color: clanColorAssign[root], rootId: root };
  }

  // ---------- Simulasi tata-letak jaringan (force-directed, sadar ukuran kotak nama) ----------
  let networkPositions = {};
  let networkSignature = '';
  let networkCanvasSize = { W: 1000, H: 700 };
  let nodeExtentCache = {};
  const NODE_GAP = 16; // jarak kosong minimal yang selalu dijaga antar kotak nama, supaya tak pernah bertabrakan

  // Perkiraan ukuran kotak visual (lingkaran + label nama) tiap orang, dipakai sebagai
  // "ruang pribadi" saat menghitung gaya tolak — supaya nama panjang/beberapa baris tak saling menimpa.
  function nodeExtent(id){
    if(nodeExtentCache[id]) return nodeExtentCache[id];
    const p = people[id];
    const name = p ? displayName(p) : '';
    const words = name.split(' ').filter(Boolean);
    let lines = [];
    if(words.length <= 1){ lines = [words[0]||'']; }
    else if(words.length === 2){ lines = [words[0], words[1]]; }
    else {
      const mid = Math.ceil(words.length/2);
      lines = [words.slice(0,1).join(' '), words.slice(1, mid+1).join(' '), words.slice(mid+1).join(' ')].filter(Boolean);
      if(lines.length > 3) lines = [lines[0], lines.slice(1).join(' ')];
    }
    lines = lines.slice(0,3);
    const labelW = Math.max(34, Math.max(...lines.map(l=>l.length), 1) * 6.5);
    const r = 17; // radius dasar simpul (ukuran saat tidak sedang dipilih)
    const ext = {
      hw: Math.max(r, labelW/2 + 6),          // setengah-lebar total (kotak nama biasanya lebih lebar dari lingkaran)
      hh: r + 13 + lines.length*13 + 8        // setengah-tinggi ke atas (radius) + jarak ke label + tinggi label
    };
    nodeExtentCache[id] = ext;
    return ext;
  }

  // Jarak minimum antara dua simpul pada arah (ux,uy) tertentu, berdasarkan "kotak pribadi" elips gabungan keduanya.
  function minSepAlong(ea, eb, ux, uy){
    const A = ea.hw+eb.hw+NODE_GAP, B = ea.hh+eb.hh+NODE_GAP;
    return 1/Math.sqrt((ux*ux)/(A*A) + (uy*uy)/(B*B));
  }

  // Lapisan pembersihan akhir: dorong pelan-pelan sampai benar-benar tak ada kotak nama yang tumpang tindih.
  function resolveOverlaps(nodeIds, pos, passes){
    const n = nodeIds.length;
    for(let pass=0; pass<passes; pass++){
      let moved = false;
      for(let i=0;i<n;i++){
        for(let j=i+1;j<n;j++){
          const a=nodeIds[i], b=nodeIds[j];
          let dx = pos[a].x-pos[b].x, dy = pos[a].y-pos[b].y;
          let dist = Math.sqrt(dx*dx+dy*dy) || 0.01;
          const ux=dx/dist, uy=dy/dist;
          const minDist = minSepAlong(nodeExtent(a), nodeExtent(b), ux, uy);
          if(dist < minDist - 0.5){
            const push = (minDist - dist)/2 + 0.3;
            pos[a].x += ux*push; pos[a].y += uy*push;
            pos[b].x -= ux*push; pos[b].y -= uy*push;
            moved = true;
          }
        }
      }
      if(!moved) break;
    }
  }

  function layoutCluster(nodeIds, edgePairs){
    const n = nodeIds.length;
    if(n === 1){ return { [nodeIds[0]]: {x:0,y:0} }; }
    const pos = {};
    const startRadius = Math.max(90, n*11);
    nodeIds.forEach((id,i)=>{
      const angle = (i/n) * 2 * Math.PI;
      pos[id] = { x: Math.cos(angle)*startRadius, y: Math.sin(angle)*startRadius };
    });

    const REST = 78;        // jarak dasar yang diusahakan untuk hubungan langsung (suami-istri, ortu-anak)
    const SPRING = 0.09;    // kekuatan tarik ke jarak ideal pada hubungan langsung
    const GRAVITY = 0.010;  // tarikan lemah ke pusat kelompok — mencegah cabang jauh "kabur" menjauh dari keluarganya
    const FAR_PUSH = 2600;  // tolakan jarak-jauh yang lemah, sekadar menyebar kelompok, tak sampai merenggangkan semua orang
    const iterations = Math.min(600, 220 + n*6);

    for(let iter=0; iter<iterations; iter++){
      const disp = {}; nodeIds.forEach(id=> disp[id]={x:0,y:0});

      for(let i=0;i<n;i++){
        for(let j=i+1;j<n;j++){
          const a=nodeIds[i], b=nodeIds[j];
          let dx = pos[a].x-pos[b].x, dy = pos[a].y-pos[b].y;
          let dist = Math.sqrt(dx*dx+dy*dy) || 0.01;
          const ux=dx/dist, uy=dy/dist;
          const minDist = minSepAlong(nodeExtent(a), nodeExtent(b), ux, uy);
          if(dist < minDist){
            const push = (minDist - dist) * 0.5; // dorong tegas kalau kotak nama sudah mulai tumpang tindih
            disp[a].x += ux*push; disp[a].y += uy*push;
            disp[b].x -= ux*push; disp[b].y -= uy*push;
          } else {
            const farForce = FAR_PUSH/(dist*dist); // di luar itu, tolakan lemah saja biar tetap berdekatan
            disp[a].x += ux*farForce; disp[a].y += uy*farForce;
            disp[b].x -= ux*farForce; disp[b].y -= uy*farForce;
          }
        }
      }

      edgePairs.forEach(([a,b])=>{
        let dx=pos[a].x-pos[b].x, dy=pos[a].y-pos[b].y;
        let dist=Math.sqrt(dx*dx+dy*dy) || 0.01;
        const ux=dx/dist, uy=dy/dist;
        const minDist = minSepAlong(nodeExtent(a), nodeExtent(b), ux, uy);
        const restDist = Math.max(REST, minDist + 6);
        const force = SPRING * (dist - restDist); // positif = tarik mendekat, negatif = dorong menjauh sedikit
        disp[a].x -= ux*force; disp[a].y -= uy*force;
        disp[b].x += ux*force; disp[b].y += uy*force;
      });

      let cx=0, cy=0;
      nodeIds.forEach(id=>{ cx+=pos[id].x; cy+=pos[id].y; });
      cx/=n; cy/=n;
      nodeIds.forEach(id=>{
        disp[id].x += (cx - pos[id].x) * GRAVITY;
        disp[id].y += (cy - pos[id].y) * GRAVITY;
      });

      const temp = Math.max(0.6, 16*(1-iter/iterations));
      nodeIds.forEach(id=>{
        let dx=disp[id].x, dy=disp[id].y;
        let dist=Math.sqrt(dx*dx+dy*dy) || 0.01;
        const limited = Math.min(dist, temp*6);
        pos[id].x += (dx/dist)*limited;
        pos[id].y += (dy/dist)*limited;
      });
    }

    resolveOverlaps(nodeIds, pos, 50);
    return pos;
  }

  // Menentukan "pulau keluarga" tempat seseorang ditampilkan: ikuti garis ayah ke leluhur klan.
  // Kalau seseorang tidak punya data ayah (misal istri/menantu yang menikah masuk tanpa data orang tuanya),
  // ia ditempatkan mengikuti pulau pasangannya, supaya satu keluarga inti tetap tampil bersama di satu pulau,
  // bukan malah jadi pulau sendiri yang mengambang terpisah.
  function getIslandRoot(id, cache, seen){
    seen = seen || new Set();
    if(cache[id]) return cache[id];
    if(seen.has(id)) return id;
    seen.add(id);
    const p = people[id];
    if(!p) return id;
    if(p.fatherId && people[p.fatherId]){
      const r = getIslandRoot(p.fatherId, cache, seen);
      cache[id] = r;
      return r;
    }
    if(p.spouseIds && p.spouseIds.length){
      const withParents = p.spouseIds.find(sid => people[sid] && people[sid].fatherId);
      const chosenSpouse = withParents || p.spouseIds[0];
      if(people[chosenSpouse]){
        const r = getIslandRoot(chosenSpouse, cache, seen);
        cache[id] = r;
        return r;
      }
    }
    cache[id] = id;
    return id;
  }

  function computeNetworkLayout(ids, edgePairs, clanRootOf){
    const sig = ids.slice().sort().join(',') + '|' + edgePairs.map(e=>e.join('-')).sort().join(',');
    if(sig === networkSignature) return networkPositions;
    nodeExtentCache = {}; // nama bisa berubah antar-render, jadi hitung ulang ukurannya

    // Kelompokkan menjadi "pulau" per KELUARGA BESAR (klan/garis ayah) — bukan sekadar "siapa terhubung siapa" —
    // supaya tiap keluarga besar tampil sebagai pulau yang benar-benar terpisah dan mudah dikenali.
    const islandCache = {};
    const islandOf = {};
    ids.forEach(id=>{ islandOf[id] = getIslandRoot(id, islandCache); });
    const islandsMap = {};
    ids.forEach(id=>{ (islandsMap[islandOf[id]] = islandsMap[islandOf[id]] || []).push(id); });
    let islandEntries = Object.entries(islandsMap);
    islandEntries.sort((a,b)=> b[1].length - a[1].length);

    // Petakan sambungan ANTAR pulau (misal pernikahan lintas keluarga besar), untuk menyusun urutan
    // penempatan pulau: pulau yang saling tersambung ditaruh berdekatan, supaya garis penghubungnya
    // tidak melintang jauh ke seluruh kanvas.
    const crossLinks = {};
    edgePairs.forEach(([a,b])=>{
      const ra = islandOf[a], rb = islandOf[b];
      if(ra === rb) return;
      crossLinks[ra] = crossLinks[ra] || {};
      crossLinks[rb] = crossLinks[rb] || {};
      crossLinks[ra][rb] = (crossLinks[ra][rb]||0) + 1;
      crossLinks[rb][ra] = (crossLinks[rb][ra]||0) + 1;
    });

    const rootOrder = [];
    const placed = new Set();
    const remaining = new Map(islandEntries);
    while(remaining.size){
      let nextRoot = null, bestScore = -1;
      if(placed.size === 0){
        nextRoot = islandEntries[0][0];
      } else {
        remaining.forEach((memberIds, root)=>{
          let score = 0;
          const links = crossLinks[root];
          if(links){ placed.forEach(pr=>{ if(links[pr]) score += links[pr]; }); }
          if(score > bestScore){ bestScore = score; nextRoot = root; }
        });
        if(bestScore <= 0){
          nextRoot = islandEntries.find(([r])=>remaining.has(r))[0];
        }
      }
      rootOrder.push(nextRoot);
      placed.add(nextRoot);
      remaining.delete(nextRoot);
    }
    const clusters = rootOrder.map(root=>islandsMap[root]);

    // Tata letak tiap pulau secara lokal (rapat, tanpa tabrakan) — hanya memakai hubungan
    // di DALAM pulau yang sama (ortu-anak, suami-istri). Pernikahan LINTAS pulau tetap
    // digambar sebagai garis penghubung nanti, tapi tidak menarik kedua pulau saling mendekat.
    const clusterData = clusters.map(comp=>{
      const compSet = new Set(comp);
      const localEdges = edgePairs.filter(([a,b])=>compSet.has(a)&&compSet.has(b));
      const lpos = layoutCluster(comp, localEdges);
      let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
      comp.forEach(id=>{
        const e = nodeExtent(id);
        minX = Math.min(minX, lpos[id].x - e.hw);
        maxX = Math.max(maxX, lpos[id].x + e.hw);
        minY = Math.min(minY, lpos[id].y - e.hh);
        maxY = Math.max(maxY, lpos[id].y + e.hh);
      });
      return { comp, lpos, minX, minY, w:(maxX-minX)||50, h:(maxY-minY)||50 };
    });

    const PAD = 64; // jarak antar pulau keluarga besar yang berbeda — cukup lega untuk terlihat terpisah,
                     // tapi tak dibuat berlebihan supaya garis penghubung lintas-keluarga tetap enak ditelusuri
    const totalNodes = ids.length;
    const MAX_ROW_WIDTH = Math.max(800, Math.sqrt(totalNodes) * 150);

    const pos = {};
    let cursorX = PAD, cursorY = PAD, rowHeight = 0;
    clusterData.forEach(c=>{
      if(cursorX > PAD && cursorX + c.w > MAX_ROW_WIDTH){
        cursorX = PAD;
        cursorY += rowHeight + PAD;
        rowHeight = 0;
      }
      c.comp.forEach(id=>{
        pos[id] = {
          x: cursorX + (c.lpos[id].x - c.minX),
          y: cursorY + (c.lpos[id].y - c.minY)
        };
      });
      cursorX += c.w + PAD;
      rowHeight = Math.max(rowHeight, c.h);
    });

    // Ukuran kanvas dihitung termasuk kotak label di tepi, supaya "Tampilkan Semua" tak pernah memotong nama.
    let maxRight = 0, maxBottom = 0;
    ids.forEach(id=>{
      const e = nodeExtent(id), pp = pos[id];
      maxRight = Math.max(maxRight, pp.x + e.hw);
      maxBottom = Math.max(maxBottom, pp.y + e.hh);
    });
    const W = Math.max(700, maxRight + PAD);
    const H = Math.max(500, maxBottom + PAD);

    networkPositions = pos;
    networkSignature = sig;
    networkCanvasSize = { W, H };
    return pos;
  }

  const ancTerms = ['','Orang tua (Ayah/Ibu)','Kakek/Nenek','Buyut','Canggah','Wareng','Udheg-udheg'];
  const descTerms = ['','Anak','Cucu','Cicit','Piut','Generasi ke-5','Generasi ke-6'];

  function describeRelation(idA, idB){
    const path = findPath(idA, idB);
    if(!path) return { text: 'Belum ada jalur penghubung yang tercatat antara kedua orang ini.', path: null };

    const common = findCommonAncestorRelation(idA, idB);
    let label = '';
    const nameA = displayName(people[idA]), nameB = displayName(people[idB]);
    if(common){
      const {gapA, gapB, id: cid} = common;
      const commonName = displayName(people[cid]);
      if(gapA === 0){
        label = `${nameB} adalah ${ (descTerms[gapB]||('generasi ke-'+gapB)).toLowerCase() } dari ${nameA}.`;
      } else if(gapB === 0){
        label = `${nameA} adalah ${ (descTerms[gapA]||('generasi ke-'+gapA)).toLowerCase() } dari ${nameB}.`;
      } else if(gapA === 1 && gapB === 1){
        label = `${nameA} dan ${nameB} adalah saudara kandung/tiri, sama-sama anak dari ${commonName}.`;
      } else {
        const degree = Math.min(gapA, gapB) - 1;
        const diff = Math.abs(gapA - gapB);
        const degreeNames = ['pertama (misan)','kedua (mindoan)','ketiga','keempat'];
        const degLabel = degreeNames[degree-1] || (degree+'');
        let diffLabel = '';
        if(diff === 1) diffLabel = ', beda satu generasi (turunan)';
        else if(diff > 1) diffLabel = `, beda ${diff} generasi`;
        label = `${nameA} dan ${nameB} adalah sepupu ${degLabel}${diffLabel}, dengan leluhur bersama ${commonName}.`;
      }
    } else {
      label = 'Kemungkinan terhubung melalui pernikahan (bukan hubungan darah langsung).';
    }
    return { text: label, path, common };
  }

  function relLabelForEdge(fromId, toId){
    const f = people[fromId], t = people[toId];
    if(!f || !t) return '';
    if(t.fatherId === fromId || t.motherId === fromId) return 'orang tua dari';
    if(f.fatherId === toId || f.motherId === toId) return 'anak dari';
    if(f.spouseIds.includes(toId)) return 'menikah dengan';
    return '';
  }

  // ---------- Rendering ----------
  function el(tag, attrs, children){
    const e = document.createElement(tag);
    if(attrs) Object.entries(attrs).forEach(([k,v])=>{
      if(k === 'html') e.innerHTML = v; else if(k==='onClick') e.addEventListener('click', v);
      else if(k==='onChange') e.addEventListener('change', v);
      else e.setAttribute(k, v);
    });
    (children||[]).forEach(c=> e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
    return e;
  }

    treeView: {scale:1,x:0,y:0}, netView: {scale:1,x:0,y:0}, daftarSearch: '' };

  function personOptions(filterGender){
    return Object.values(people)
      .filter(p => !filterGender || p.gender === filterGender)
      .sort((a,b)=> displayName(a).localeCompare(displayName(b)));
  }

  function render(){
    const ae = document.activeElement;
    let focusMemory = null;
    if(ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA') && ae.id){
      focusMemory = { id: ae.id, selStart: ae.selectionStart, selEnd: ae.selectionEnd };
    }

    root.innerHTML = '';
    const wrap = el('div', {class:'sk-wrap'});
    wrap.appendChild(renderSidebar());
    wrap.appendChild(renderMain());
    root.appendChild(wrap);

    if(focusMemory){
      const target = document.getElementById(focusMemory.id);
      if(target){
        target.focus();
        try{ target.setSelectionRange(focusMemory.selStart, focusMemory.selEnd); }catch(e){}
      }
    }
  }

      btn.addEventListener('click', ()=>{
        if(key === 'tambah' && state.tab !== 'tambah') { /* keep editId if coming back to same edit */ }

        render();

      tabs.appendChild(btn);
    });

    if(Object.keys(people).length === 0){

      demoBtn.addEventListener('click', async ()=>{
        await seedDemoData();
        state.tab = 'jaringan';
        render();
      });
      side.appendChild(demoBtn);

    if(state.tab === 'tambah'){

      side.appendChild(el('div', {style:'font-size:13px;color:var(--ink-soft);line-height:1.6;'}, [

    side.appendChild(el('div', {style:'border-top:1px solid var(--line);margin-top:20px;padding-top:16px;'}, [
      el('div', {style:'font-size:11px;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;'}, ['Cadangan Data']),
      (()=>{
        const exportBtn = el('button', {class:'sk-btn secondary', style:'margin-bottom:8px;'}, ['💾 Ekspor Data (Backup)']);
        exportBtn.addEventListener('click', ()=>{
          if(Object.keys(people).length === 0){ alert('Belum ada data untuk diekspor.'); return; }
          const blob = new Blob([JSON.stringify(people, null, 2)], {type:'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const today = new Date().toISOString().slice(0,10);
          a.href = url; a.download = `silsilah-backup-${today}.json`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
        return exportBtn;
      })(),
      (()=>{
        const importInput = el('input', {type:'file', accept:'application/json,.json', style:'display:none;'});
        importInput.addEventListener('change', async (e)=>{
          const file = e.target.files[0];
          if(!file) return;
          try{
            const text = await file.text();
            const parsed = JSON.parse(text);
            if(typeof parsed !== 'object' || parsed === null) throw new Error('format tidak sesuai');
            if(Object.keys(people).length > 0){
              if(!window.confirm('Ini akan MENGGANTI seluruh data yang ada saat ini dengan isi file backup. Lanjutkan?')) return;

        });
        const importBtn = el('button', {class:'sk-btn secondary'}, ['📥 Impor Data (Pulihkan)']);
        importBtn.addEventListener('click', ()=> importInput.click());
        const wrap = el('div', {}, [importBtn, importInput]);
        return wrap;
      })(),
      el('div', {style:'font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.5;'}, ['Simpan file backup ke Google Drive atau penyimpanan lain secara berkala. Kalau membuka aplikasi ini di perangkat/salinan lain, gunakan "Impor Data" untuk memuat data yang sama.'])
    ]));

    return side;
  }
